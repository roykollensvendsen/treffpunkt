site_name: Treffpunkt
site_description: Record and score shots on NSF/ISSF targets across competitions.
repo_url: https://github.com/roykollensvendsen/treffpunkt
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: teal

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

