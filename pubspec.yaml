name: treffpunkt
description: "Record and score shots on NSF/ISSF targets across competitions."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cupertino_icons: ^1.0.8
  file_picker: ^3.0.4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.4
  flutter_riverpod: ^3.3.2
  geolocator: ^14.0.3
  http: ^1.2.0
  image: ^4.3.0
  image_picker: ^1.1.2
  meta: ^1.18.0
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.15.0
  uuid: ^4.5.3
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  # The user manual is read in-app from the same Markdown the published guide
  # uses — one source of truth, available offline (spec 0050).
  assets:
    - docs/user/
    - assets/sounds/
