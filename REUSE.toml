version = 1

# Generated platform scaffolding and IDE/tooling files (no inline headers).
[[annotations]]
path = [
  "android/**",
  "ios/**",
  "web/**",
  ".idea/**",
  "**/*.iml",
  ".metadata",
  "**/.gitignore",
  "pubspec.lock",
  ".fvmrc",
  "config/env.example.json",
  "supabase/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Roy Kollen Svendsen"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Documentation, configuration and the root license copy.
[[annotations]]
path = ["**/*.md", "**/*.yaml", "**/*.yml", "COPYING"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Roy Kollen Svendsen"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Third-party Passkeys Web SDK, vendored for supabase_flutter (MIT, Corbado).
[[annotations]]
path = ["web/bundle.js"]
precedence = "override"
SPDX-FileCopyrightText = "2023 Corbado GmbH"
SPDX-License-Identifier = "MIT"
