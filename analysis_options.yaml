# Static analysis for Treffpunkt.
#
# Lints: very_good_analysis (strict, state of the art). Formatting: `dart format`.
# CI runs `flutter analyze --fatal-infos --fatal-warnings`, so every hint here is
# a hard failure in the pipeline.
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
